<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - CarMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-CdbZxD0Q9bEzrZaOaHJ3xHd6bo4DVzYZ1Qp5I3Qi3ld5rWME2T6TF6KidHZV4k5q" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">CarMarket</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin" aria-controls="navAdmin" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navAdmin">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Đăng xuất</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="fw-bold">Trang quản trị</h1>
        <p class="text-muted" id="admin-status">Xin chào Admin</p>
      </div>
      <button class="btn btn-outline-danger" id="logout-button">Đăng xuất</button>
    </div>

    <section class="mb-5">
      <div class="card bg-light shadow-sm">
        <div class="card-body">
          <h4 class="mb-4">Thêm xe mới</h4>
          <form id="car-add-form" class="row g-3">
        <input type="hidden" id="edit-car-id">
        <div class="col-md-6">
          <label class="form-label">Tên xe</label>
          <input type="text" id="car-name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Model</label>
          <input type="text" id="car-model" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Giá</label>
          <input type="text" id="car-price" class="form-control" placeholder="Ví dụ: 1.200.000.000 ₫" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Loại xe</label>
          <select id="car-category" class="form-control">
            <option value="sport">Thể thao</option>
            <option value="sedan">Sedan</option>
            <option value="electric">Xe điện</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Ảnh (URL)</label>
          <input type="url" id="car-image" class="form-control" placeholder="https://..." required>
        </div>
        <div class="col-12">
          <label class="form-label">Mô tả ngắn</label>
          <textarea id="car-description" class="form-control" rows="3" placeholder="Mô tả xe"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Điểm nổi bật</label>
          <input type="text" id="car-highlights" class="form-control" placeholder="Phân cách bằng |">
        </div>
        <div class="col-md-6">
          <label class="form-label">Thông số</label>
          <input type="text" id="car-specs" class="form-control" placeholder="Phân cách bằng |">
        </div>
        <div class="col-12 text-end">
          <button class="btn btn-primary" type="submit" id="save-car-button">Thêm xe</button>
          <button type="button" class="btn btn-outline-secondary" id="cancel-edit-button" style="display:none;">Hủy sửa</button>
        </div>
      </form>
    </div>
  </div>
</section>

    <section>
      <h4 class="mb-3">Danh sách xe hiện tại</h4>
      <div id="admin-car-list" class="row gy-3">
        <!-- Danh sách xe sẽ hiển thị ở đây -->
      </div>
    </section>

    <section class="mt-5">
      <h4 class="mb-3">Yêu cầu khách hàng</h4>
      <div id="customer-inquiries" class="row gy-3">
        <!-- Danh sách khách hàng sẽ hiển thị ở đây -->
      </div>
    </section>

    <section class="mt-5">
      <h4 class="mb-3">Lịch sử đơn hàng</h4>
      <div id="order-history" class="row gy-3">
        <!-- Lịch sử đơn hàng sẽ hiển thị ở đây -->
      </div>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">CarMarket Admin</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-5C7dFJqLkO0fK9zXXoA5tGRHW9gpdFKJp3zBsQeGKpG2CrB8EqKXJj5x7Gu1ew7X" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
